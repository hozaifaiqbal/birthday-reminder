name: Daily Birthday Reminder

on:
  schedule:
    # This runs at 19:30 UTC every day, which is 01:00 AM IST
    - cron: '30 19 * * *'
  workflow_dispatch: # This allows you to also run it manually for testing
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread pandas google-auth

      - name: Create JSON Key File
        run: echo '${{ secrets.GCP_JSON }}' > birthday-reminder.json

      - name: Run Python script
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: python main.py
